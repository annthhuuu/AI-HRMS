{% extends 'base.html' %}

{% block content %}

<h2>{{ title }}</h2>

<div class="card p-4 shadow-sm">

    <form method="post">
        {% csrf_token %}

        {{ form.as_p }}

        <div class="d-flex justify-content-end mt-3">

            <a href="{% url 'payroll_list' %}" class="btn btn-secondary me-2">
                Cancel
            </a>

            <button type="submit" class="btn btn-success">
                Submit Payroll
            </button>

        </div>

    </form>

</div>

{% endblock %}
