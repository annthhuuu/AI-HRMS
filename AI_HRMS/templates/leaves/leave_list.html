{% extends 'base.html' %}

{% block content %}

<h2 class="mb-4">
    Leave Requests
</h2>

<div class="glass-card">

<table class="table">

    <thead>

        <tr>

            <th>Employee</th>

            <th>Start</th>

            <th>End</th>

            <th>Status</th>

            <th>Action</th>

        </tr>

    </thead>

    <tbody>

        {% for leave in leaves %}

        <tr>

            <td>{{ leave.employee }}</td>

            <td>{{ leave.start_date }}</td>

            <td>{{ leave.end_date }}</td>

            <td>{{ leave.status }}</td>

            <td>

                {% if leave.status == "PENDING" %}

                <a href="{% url 'approve_leave' leave.id %}"
                   class="btn btn-success btn-sm">

                    Approve

                </a>

                <a href="{% url 'reject_leave' leave.id %}"
                   class="btn btn-danger btn-sm">

                    Reject

                </a>

                {% endif %}

            </td>

        </tr>

        {% endfor %}

    </tbody>

</table>

</div>

{% endblock %}
