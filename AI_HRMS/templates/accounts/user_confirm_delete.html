{% extends "base.html" %}

{% block content %}

<div class="glass-card">

    <h3>Delete User</h3>

    <p>

        Are you sure you want to delete

        <strong>
            {{ user_obj.username }}
        </strong>

        ?

    </p>

    <form method="POST">

        {% csrf_token %}

        <button
            class="btn btn-danger">

            Delete

        </button>

        <a href="{% url 'user_list' %}"
           class="btn btn-secondary">

            Cancel

        </a>

    </form>

</div>

{% endblock %}
