{% extends 'base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card">

            <div class="card-header">
                Login
            </div>

            <div class="card-body">

                <form method="POST">

                    {% csrf_token %}

                    <input
                        type="text"
                        name="username"
                        class="form-control mb-3"
                        placeholder="Username">

                    <input
                        type="password"
                        name="password"
                        class="form-control mb-3"
                        placeholder="Password">

                    <button
                        class="btn btn-primary w-100">

                        Login

                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
