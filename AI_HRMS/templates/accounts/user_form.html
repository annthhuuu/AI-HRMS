{% extends "base.html" %}

{% block content %}

<div class="glass-card">

    <h3>{{ title }}</h3>

    {% if form.errors %}

    <div class="alert alert-danger">

        {{ form.errors }}

    </div>

    {% endif %}

    <form method="POST">

        {% csrf_token %}

        {{ form.as_p }}

        <button
            type="submit"
            class="btn btn-primary">

            Save

        </button>

    </form>

</div>

{% endblock %}
